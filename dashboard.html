<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FitFlow AI</title>

    <!-- Styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Jouw auth.js -->
    <script src="auth.js"></script>
</head>

<body class="bg-zinc-950 text-white min-h-screen">

<!-- Header -->
<div class="flex justify-between items-center p-6 border-b border-zinc-800">

    <h1 class="text-2xl font-bold">Dashboard</h1>

    <!-- ✅ Logout knop -->
    <button onclick="logout()"
        class="bg-red-500/10 hover:bg-red-500/20 text-red-400 px-6 py-2 rounded-2xl">
        Uitloggen
    </button>

</div>

<!-- Content -->
<div class="p-6">
    <h2 class="text-xl mb-2">Welkom 👋</h2>
    <p class="text-zinc-400">Je bent succesvol ingelogd.</p>
</div>

<!-- ✅ SCRIPT -->
<script>
document.addEventListener('DOMContentLoaded', async () => {

    if (!window.supabase) {
        console.error("❌ Supabase niet geladen");
        return;
    }

    const supabase = window.supabase;

    // ✅ CHECK OF USER INGELOGD IS
    const { data, error } = await supabase.auth.getSession();

    console.log("SESSION:", data);

    if (!data.session) {
        console.log("❌ Geen sessie → redirect");
        window.location.href = "index.html";
        return;
    }

    console.log("✅ Gebruiker is ingelogd");

});


// ✅ LOGOUT FUNCTIE
async function logout() {

    if (!window.supabase) {
        console.error("❌ Supabase niet geladen");
        return;
    }

    const supabase = window.supabase;

    try {
        const { error } = await supabase.auth.signOut();

        if (error) throw error;

        console.log("✅ Uitgelogd");

        // ✅ Redirect
        window.location.href = "index.html";

    } catch (err) {
        console.error("❌ Logout fout:", err.message);
    }
}
</script>

</body>
</html>
