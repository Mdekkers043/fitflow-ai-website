<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen - FitFlow AI</title>

    <!-- Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- ✅ 1. Supabase (MOET eerst) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ✅ 2. Jouw auth.js -->
    <script src="auth.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .heading { font-family: 'Space Grotesk', sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%); }
    </style>
</head>

<body class="bg-zinc-950 text-white min-h-screen">

<nav class="fixed top-0 w-full z-50 bg-zinc-950 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-lime-500 rounded-2xl flex items-center justify-center text-black font-bold text-2xl">💪</div>
            <span class="text-2xl font-bold heading tracking-tighter">FitFlow AI</span>
        </div>
        <a href="index.html" class="text-lime-400 hover:text-white">← Terug naar homepage</a>
    </div>
</nav>

<div class="hero-bg min-h-screen flex items-center justify-center pt-24">
    <div class="max-w-md w-full mx-auto px-6">
        <div class="bg-zinc-900 rounded-3xl p-10 shadow-2xl border border-zinc-800">

            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-lime-500 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-4">💪</div>
                <h1 class="text-4xl font-bold heading tracking-tight">Welkom terug</h1>
                <p class="text-zinc-400 mt-3">Log in om verder te gaan</p>
            </div>

            <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500 text-red-400 px-4 py-3 rounded-2xl text-sm mb-6"></div>
            <div id="status" class="text-xs text-zinc-500 mb-4 min-h-[20px]"></div>

            <form id="loginForm" class="space-y-6">

                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">E-mailadres</label>
                    <input type="email" id="email"
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 outline-none"
                           required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">Wachtwoord</label>
                    <input type="password" id="password"
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 outline-none"
                           required>
                </div>

                <button type="submit" id="loginButton"
                        class="w-full bg-lime-500 hover:bg-lime-400 text-black font-semibold text-lg py-5 rounded-2xl transition-all hover:scale-105">
                    <span id="buttonText">Inloggen</span>
                </button>

            </form>
        </div>
    </div>
</div>

<!-- ✅ LOGIN SCRIPT -->
<script>
document.addEventListener('DOMContentLoaded', () => {

    console.log("🚀 Login pagina geladen");

    // ✅ VEILIGE CHECK
    if (!window.supabase) {
        console.error("❌ Supabase niet geladen");
        return;
    }

    const supabase = window.supabase;

    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('errorMessage');
    const statusDiv = document.getElementById('status');
    const buttonText = document.getElementById('buttonText');
    const loginButton = document.getElementById('loginButton');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        errorDiv.classList.add('hidden');
        statusDiv.textContent = "Bezig met inloggen...";

        loginButton.disabled = true;
        buttonText.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Inloggen...`;

        try {
            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            console.log("RESULT:", data, error);

            if (error) throw error;

            if (!data.user) {
                throw new Error("Geen gebruiker gevonden");
            }

            statusDiv.textContent = "✅ Ingelogd!";
            window.location.href = "dashboard.html";

        } catch (err) {
            console.error("LOGIN ERROR:", err);

            errorDiv.textContent = err.message || "Controleer je gegevens";
            errorDiv.classList.remove('hidden');
            statusDiv.textContent = "";
        } finally {
            loginButton.disabled = false;
            buttonText.textContent = "Inloggen";
        }
    });

});
</script>

</body>
</html>
