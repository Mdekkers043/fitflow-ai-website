<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen - FitFlow AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- BELANGRIJK: Supabase library eerst laden -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .heading { font-family: 'Space Grotesk', sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <nav class="fixed top-0 w-full z-50 bg-zinc-950 border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-lime-500 rounded-2xl flex items-center justify-center text-black font-bold text-2xl">💪</div>
                <span class="text-2xl font-bold heading tracking-tighter">FitFlow AI</span>
            </div>
            <a href="index.html" class="hover:text-lime-400">Home</a>
        </div>
    </nav>

    <div class="hero-bg min-h-screen flex items-center justify-center pt-20">
        <div class="max-w-md w-full mx-auto px-6 py-12">
            <div class="bg-zinc-900 rounded-3xl p-10 shadow-2xl border border-zinc-800">
                <div class="text-center mb-10">
                    <div class="w-16 h-16 bg-lime-500 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-4">💪</div>
                    <h1 class="text-4xl font-bold heading tracking-tight">Welkom terug</h1>
                    <p class="text-zinc-400 mt-3">Log in om je workouts te bekijken</p>
                </div>

                <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500 text-red-400 px-4 py-3 rounded-2xl text-sm mb-6"></div>

                <form id="loginForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-2">E-mailadres</label>
                        <input type="email" id="email" class="w-full bg-zinc-800 border border-zinc-700 focus:border-lime-500 rounded-2xl px-5 py-4 outline-none" placeholder="jouw@email.nl" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-2">Wachtwoord</label>
                        <input type="password" id="password" class="w-full bg-zinc-800 border border-zinc-700 focus:border-lime-500 rounded-2xl px-5 py-4 outline-none" placeholder="••••••••" required>
                    </div>

                    <button type="submit" id="loginButton"
                            class="w-full bg-lime-500 hover:bg-lime-400 text-black font-semibold text-lg py-5 rounded-2xl transition-all hover:scale-105">
                        <span id="buttonText">Inloggen</span>
                    </button>
                </form>

                <div class="mt-8 text-center text-zinc-400">
                    Nog geen account? <a href="signup.html" class="text-lime-400">Meld je aan</a>
                </div>
            </div>
        </div>
    </div>

    <!-- SUPABASE INITIALISATIE + LOGIN LOGIC -->
    <script>
        // Wacht tot alles geladen is
        document.addEventListener('DOMContentLoaded', () => {
            
            const supabaseUrl = 'https://yjopbpjjusidgmobsazs.supabase.co';
            const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlqb3BicGpqdXNpZGdtb2JzYXpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NzIxMjgsImV4cCI6MjA5NDU0ODEyOH0.kBWUtet80YvCan3bbUfLzxMfAu0ekitejiDv3D5oIwc';

            const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);
            window.supabase = supabase;

            console.log('✅ Supabase geïnitialiseerd');

            // Login form
            const form = document.getElementById('loginForm');
            const errorDiv = document.getElementById('errorMessage');
            const loginButton = document.getElementById('loginButton');
            const buttonText = document.getElementById('buttonText');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                errorDiv.classList.add('hidden');
                loginButton.disabled = true;
                buttonText.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Inloggen...`;

                try {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (error) throw error;

                    console.log('✅ Ingelogd!', data.user);
                    window.location.href = 'dashboard.html';

                } catch (error) {
                    console.error(error);
                    errorDiv.textContent = error.message || 'Inloggen mislukt. Controleer je gegevens.';
                    errorDiv.classList.remove('hidden');
                } finally {
                    loginButton.disabled = false;
                    buttonText.textContent = 'Inloggen';
                }
            });
        });
    </script>
</body>
</html>
