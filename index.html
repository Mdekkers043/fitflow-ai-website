<!-- FitFlow AI - NEW FLOW (Centered Signup + Step Screen) -->
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitFlow AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#fff;color:#111}
.container{max-width:900px;margin:auto;padding:20px}
.center-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}


.card{
  width:100%;
  max-width:500px;
  background:white;
  padding:40px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}


h1{font-size:34px;margin-bottom:10px}
p{color:#555;margin-bottom:20px}


input,select{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}


.button{
  width:100%;
  background:#16a34a;
  color:white;
  padding:14px;
  border-radius:10px;
  border:none;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}


.button:hover{transform:scale(1.03)}


.hidden{display:none}


.progress{font-size:14px;color:#888;margin-bottom:10px}
</style>
</head>


<body>

<!-- MAIN SCREEN -->
<div id="screen1" class="center-screen">
  <div class="card">
    <h1>Start jouw traject 💪</h1>
    <p>Beantwoord 3 vragen en krijg jouw persoonlijke plan</p>
    <div class="progress">Stap 1 van 3</div>
    <select id="goal">
      <option value="">Kies doel</option>
      <option>Afvallen</option>
      <option>Spieropbouw</option>
    </select>
    <select id="level">
      <option value="">Kies niveau</option>
      <option>Beginner</option>
      <option>Advanced</option>
    </select>
    <select id="days">
      <option value="">Dagen per week</option>
      <option>3</option>
      <option>4</option>
      <option>5</option>
    </select>
    <button class="button" onclick="goNext()">Ga verder →</button>
  </div>
</div>
<!-- SECOND SCREEN -->
<div id="screen2" class="center-screen hidden">
  <div class="card">
    <h1>Bijna klaar 🚀</h1>
    <p>Voer je gegevens in en start direct</p>
    <div class="progress">Laatste stap</div>
    <input type="text" placeholder="Naam" id="name">
    <input type="text" placeholder="WhatsApp nummer" id="phone">


    <button class="button" onclick="finish()">Start gratis</button>
  </div>
</div>

<script>
function goNext(){
  let goal = document.getElementById('goal').value;
  let level = document.getElementById('level').value;
  let days = document.getElementById('days').value;
  if(goal && level && days){
    document.getElementById('screen1').classList.add('hidden');
    document.getElementById('screen2').classList.remove('hidden');
  } else {
    alert('Vul alle vragen in ✅');
  }
}

function finish(){
  let name = document.getElementById('name').value;
  let phone = document.getElementById('phone').value;
  if(name && phone){
    alert('✅ Je bent aangemeld! (mock)');
  } else {
    alert('Vul je gegevens in');
  }
}
</script>

</body>
