<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitFlow AI • Account Aanmaken</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

body { font-family: 'Inter', sans-serif; }
.heading { font-family: 'Space Grotesk', sans-serif; }

.hero-bg {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
}

.form-step { display: none; }
.form-step.active { display: block; }
</style>

</head>

<body class="bg-zinc-950 text-white">

<nav class="fixed top-0 w-full z-50">
<div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-9 h-9 bg-lime-500 rounded-2xl flex items-center justify-center text-black">💪</div>
<span class="text-2xl font-bold heading">FitFlow AI</span>
</div>
<a href="/" class="text-zinc-400 hover:text-white">← Terug naar homepage</a>
</div>
</nav>

<section class="hero-bg min-h-screen flex items-center pt-20">
<div class="max-w-4xl mx-auto px-6 py-12">

<div class="text-center mb-10">
<h1 class="text-5xl font-bold heading mb-4">
Jouw persoonlijke AI-coach<br>
<span class="text-lime-400">wordt aangemaakt</span>
</h1>
</div>

<div class="bg-zinc-900 rounded-3xl p-8 border border-zinc-800 max-w-2xl mx-auto">

<div id="step1" class="form-step active">

<input id="naam" placeholder="Naam" class="w-full mb-3 p-3 bg-zinc-800 rounded">
<input id="email" placeholder="Email" class="w-full mb-3 p-3 bg-zinc-800 rounded">
<input id="wachtwoord" type="password" placeholder="Wachtwoord" class="w-full mb-3 p-3 bg-zinc-800 rounded">
<input id="whatsapp" placeholder="WhatsApp" class="w-full mb-3 p-3 bg-zinc-800 rounded">

<button onclick="nextStep()" class="w-full bg-lime-500 py-3 rounded mt-4">
Volgende stap
</button>

</div>

<div id="step2" class="form-step">

<div id="doel-options" class="grid grid-cols-2 gap-3 mb-4"></div>

<button onclick="submitRegistration()" class="w-full bg-lime-500 py-3 rounded">
Account aanmaken
</button>

</div>

</div>

</div>
</section>

<div id="success-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
<div class="bg-zinc-900 p-8 rounded-3xl">
<h2 class="text-2xl mb-4">✅ Account aangemaakt</h2>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

const supabaseClient = supabase.createClient(
    "https://yjopbpjjusidgmobsazs.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlqb3BicGpqdXNpZGdtb2JzYXpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NzIxMjgsImV4cCI6MjA5NDU0ODEyOH0.kBWUtet80YvCan3bbUfLzxMfAu0ekitejiDv3D5oIwc"
);

let selectedGoal = '';

function nextStep(){
document.getElementById('step1').classList.remove('active');
document.getElementById('step2').classList.add('active');
}

const goals = ["Afvallen","Spiermassa","Kracht","Conditie","Fitter"];

const container = document.getElementById("doel-options");

goals.forEach(goal=>{
let b = document.createElement("button");
b.textContent = goal;
b.className = "border border-zinc-700 rounded p-3";
b.onclick = ()=>{
selectedGoal = goal;
};
container.appendChild(b);
});

async function submitRegistration(){

const naam = document.getElementById('naam').value;
const email = document.getElementById('email').value;
const password = document.getElementById('wachtwoord').value;
const whatsapp = document.getElementById('whatsapp').value;

if(!naam || !email || !password || !whatsapp || !selectedGoal){
alert("Vul alles in");
return;
}

try{

const { data, error } = await supabaseClient.auth.signUp({
email,
password
});

if(error) throw error;
if(!data.user) throw new Error("User niet aangemaakt");

// ✅ FIX BELANGRIJK
const { error: profileError } = await supabaseClient
.from('profiles')
.insert([{
id: data.user.id,
name: naam,
email: email,
phone: whatsapp,
goal: selectedGoal
}]);

if(profileError) throw profileError;

document.getElementById('success-modal').classList.remove('hidden');

}catch(err){
console.error(err);
alert(err.message);
}
}

window.nextStep = nextStep;
window.submitRegistration = submitRegistration;

});
</script>

</body>
</html>
