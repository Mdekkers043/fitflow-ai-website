<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registreren - FitFlow AI</title>

    <!-- Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>

</head>

<body class="bg-zinc-950 text-white min-h-screen">

    <div class="min-h-screen flex items-center justify-center">
        <div class="max-w-md w-full px-6">

            <div class="bg-zinc-900 rounded-3xl p-10 border border-zinc-800 shadow-2xl">

                <div class="text-center mb-10">
                    <div class="text-4xl mb-4">💪</div>
                    <h1 class="text-3xl font-bold">Account aanmaken</h1>
                    <p class="text-zinc-400 mt-2">Start met FitFlow AI</p>
                </div>

                <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500 text-red-400 px-4 py-3 rounded-2xl text-sm mb-6"></div>
                <div id="status" class="text-sm text-zinc-400 mb-4"></div>

                <form id="signupForm" class="space-y-6">

                    <div>
                        <label class="block text-sm mb-2 text-zinc-400">E-mailadres</label>
                        <input type="email" id="email"
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 outline-none"
                               required>
                    </div>

                    <div>
                        <label class="block text-sm mb-2 text-zinc-400">Wachtwoord</label>
                        <input type="password" id="password"
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 outline-none"
                               required>
                    </div>

                    <button type="submit" id="signupButton"
                            class="w-full bg-lime-500 hover:bg-lime-400 text-black font-semibold py-4 rounded-2xl">
                        <span id="buttonText">Account maken</span>
                    </button>

                </form>

                <p class="text-center mt-6 text-zinc-400 text-sm">
                    Heb je al een account?
                    <a href="login.html" class="text-lime-400 hover:text-white">Inloggen</a>
                </p>

            </div>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const supabase = window.supabase;

    const form = document.getElementById('signupForm');
    const errorDiv = document.getElementById('errorMessage');
    const statusDiv = document.getElementById('status');
    const buttonText = document.getElementById('buttonText');
    const button = document.getElementById('signupButton');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        errorDiv.classList.add('hidden');
        statusDiv.textContent = "Account aanmaken...";
        button.disabled = true;

        buttonText.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Bezig...`;

        try {
            const { data, error } = await supabase.auth.signUp({
                email,
                password
            });

            if (error) throw error;

            console.log("✅ Account aangemaakt:", data);

            statusDiv.textContent = "✅ Gelukt! Doorsturen...";
            window.location.href = "dashboard.html";

        } catch (err) {
            console.error(err);

            errorDiv.textContent = err.message || "Signup mislukt";
            errorDiv.classList.remove('hidden');
            statusDiv.textContent = "";
        } finally {
            button.disabled = false;
            buttonText.textContent = "Account maken";
        }
    });

});
</script>

</body>
</html>
