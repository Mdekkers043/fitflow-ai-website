<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitFlow AI • Account Aanmaken</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

body { font-family: 'Inter', sans-serif; }
.heading { font-family: 'Space Grotesk', sans-serif; }

.hero-bg {
  background: linear-gradient(135deg,#0a0a0a 0%,#1a1a1a 100%);
}

.form-step { display:none; }
.form-step.active { display:block; }
</style>
</head>

<body class="bg-zinc-950 text-white">

<section class="hero-bg min-h-screen flex items-center pt-20">
<div class="max-w-4xl mx-auto px-6 py-12">

<h1 class="text-4xl font-bold mb-6 text-center">
FitFlow signup 💪
</h1>

<div class="bg-zinc-900 p-8 rounded-3xl max-w-lg mx-auto">

<!-- STEP 1 -->
<div id="step1" class="form-step active">

<input id="naam" placeholder="Naam" class="w-full mb-3 p-3 rounded bg-zinc-800">
<input id="email" placeholder="Email" class="w-full mb-3 p-3 rounded bg-zinc-800">
<input id="wachtwoord" type="password" placeholder="Wachtwoord" class="w-full mb-3 p-3 rounded bg-zinc-800">
<input id="whatsapp" placeholder="+316..." class="w-full mb-3 p-3 rounded bg-zinc-800">

<button type="button" onclick="nextStep()" class="w-full bg-lime-500 text-black p-3 rounded mt-4">
Volgende →
</button>

</div>

<!-- STEP 2 -->
<div id="step2" class="form-step">

<p class="mb-2">Doel</p>
<button type="button" onclick="selectGoal('Afvallen')">Afvallen</button>
<button type="button" onclick="selectGoal('Spieropbouw')">Spieropbouw</button>

<p class="mt-4 mb-2">Dagen</p>
<button type="button" onclick="selectFreq('2')">2x</button>
<button type="button" onclick="selectFreq('3')">3x</button>

<p class="mt-4 mb-2">Locatie</p>
<button type="button" onclick="selectLoc('Thuis')">Thuis</button>
<button type="button" onclick="selectLoc('Gym')">Gym</button>

<button type="button" onclick="signup()" class="w-full bg-lime-500 text-black p-3 rounded mt-4">
Account maken ✅
</button>

</div>

</div>
</div>
</section>

<script>
// ✅ JOUW SUPABASE
const supabase = window.supabase.createClient(
  "https://yjopbpjjusidgmobsazs.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlqb3BicGpqdXNpZGdtb2JzYXpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NzIxMjgsImV4cCI6MjA5NDU0ODEyOH0.kBWUtet80YvCan3bbUfLzxMfAu0ekitejiDv3D5oIwc"
);

let goal = "";
let freq = "";
let loc = "";

// ✅ STEP SWITCH
function nextStep(){
  document.getElementById("step1").classList.remove("active");
  document.getElementById("step2").classList.add("active");
}

// ✅ SELECTS
function selectGoal(val){ goal = val; }
function selectFreq(val){ freq = val; }
function selectLoc(val){ loc = val; }

// ✅ SIGNUP
async function signup(){

  const naam = document.getElementById("naam").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("wachtwoord").value;
  const phone = document.getElementById("whatsapp").value;

  if(!naam || !email || !password || !phone || !goal){
    alert("Vul alles in");
    return;
  }

  try{

    // ✅ ACCOUNT AANMAKEN
    const { data, error } = await supabase.auth.signUp({
      email,
      password
    });

    if(error) throw error;

    // ✅ DATA OPSLAAN
    const { error: dbError } = await supabase
      .from("users")
      .insert([{
        user_id: data.user.id,
        name: naam,
        email: email,
        phone: phone,
        goal: goal,
        days_per_week: freq,
        location: loc,
        subscription_active: false,
        trial_ends_at: new Date(Date.now()+3*24*60*60*1000)
      }]);

    if(dbError) throw dbError;

    alert("✅ Account aangemaakt!");

  } catch(err){
    console.error(err);
    alert("Fout: " + err.message);
  }
}
</script>

</body>
</html>
