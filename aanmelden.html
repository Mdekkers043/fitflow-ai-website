<div class="page-bg">

<div style="padding:20px 40px;">
<a href="index.html" style="text-decoration:none;">
  <img src="fitflow.png" style="height:200px;">
</a>
  
  
<form id="onboardingForm" style="max-width:400px;margin:30px auto 0;">

<p style="font-weight:600;margin-bottom:15px;color:#aaa;">
  Stap <span id="stepNr">1</span> van 5
</p>

<div style="height:6px;background:rgba(255,255,255,0.2);border-radius:10px;margin-bottom:25px;">
  <div id="progressBar" style="height:6px;width:20%;background:#22c55e;border-radius:10px;transition:0.25s;"></div>
</div>

<!-- STEP 0 -->
<div class="step">
  <p><strong>Account</strong></p>

  <input type="email" placeholder="Email" required class="input-ui">
  <input type="password" placeholder="Wachtwoord" required class="input-ui">
  <input type="text" placeholder="Naam" required class="input-ui">
  <input type="tel" placeholder="WhatsApp (+316...)" required class="input-ui">
</div>

<!-- STEP 1 -->
<div class="step" style="display:none;">
  <p><strong>Doel</strong></p>

  <select required class="input-ui">
    <option value="">Kies...</option>
    <option>Afvallen</option>
    <option>Spieropbouw</option>
  </select>
</div>

<!-- STEP 2 -->
<div class="step" style="display:none;">
  <p><strong>Niveau</strong></p>

  <select required class="input-ui">
    <option value="">Kies...</option>
    <option>Beginner</option>
    <option>Advanced</option>
  </select>
</div>

<!-- STEP 3 -->
<div class="step" style="display:none;">
  <p><strong>Dagen per week</strong></p>

  <input type="number" min="1" max="7" required class="input-ui">
</div>

<!-- STEP 4 -->
<div class="step" style="display:none;">
  <p><strong>Locatie</strong></p>

  <select required class="input-ui">
    <option value="">Kies...</option>
    <option>Thuis</option>
    <option>Gym</option>
  </select>
</div>

<!-- FINAL -->
<div id="finalFields" style="display:none;margin-top:10px;">
  <button type="submit" class="button" style="width:100%;">
    Aanmelden 🚀
  </button>
</div>

<!-- NAV BUTTONS -->
<button type="button" id="prevBtn" class="button" style="background:#444;width:100%;margin-top:10px;display:none;">
  ← Vorige
</button>

<button type="button" id="nextBtn" class="button" style="width:100%;margin-top:10px;">
  Volgende →
</button>

<!-- SUCCESS -->

<div id="successMessage" style="
  display:none;
  text-align:center;
  color:#fff;
  margin-top:40px;
  padding:30px;
  background:rgba(0,0,0,0.5);
  border-radius:20px;
  backdrop-filter:blur(10px);
">
  <h2 style="color:#22c55e;margin-bottom:10px;">✅ Registratie gelukt!</h2>
  <p>Welkom bij FitFlow 💪</p>
  <p>Je ontvangt binnenkort je eerste workout.</p>
</div>


</form>
</div>

<style>
body {
  margin: 0;
  font-family:'Inter',sans-serif;
  color: #fff;

  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('background.png') center / cover no-repeat fixed;
}
</style>

<style>
/* ✅ INPUT PERFECT LEESBAAR */
.input-ui {
  width:100%;
  padding:15px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.4);
  background:rgba(0,0,0,0.55);
  color:#fff;
  font-size:15px;
}

.input-ui::placeholder {
  color:#ddd;
}

.input-ui:focus {
  outline:none;
  border:1px solid #22c55e;
  box-shadow:0 0 0 2px rgba(34,197,94,0.25);
}

select.input-ui option {
  color:#000;
}
</style>

<script>
const steps = document.querySelectorAll(".step");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");
const finalFields = document.getElementById("finalFields");

const progressBar = document.getElementById("progressBar");
const stepNr = document.getElementById("stepNr");

const form = document.getElementById("onboardingForm");
const successMessage = document.getElementById("successMessage");

let currentStep = 0;
const totalSteps = steps.length;

function updateUI() {

  steps.forEach((s,i)=>{
    s.style.display = i === currentStep ? "block" : "none";
  });

  // progress
  stepNr.innerText = currentStep + 1;
  progressBar.style.width = ((currentStep+1)/totalSteps)*100 + "%";

  // knop states
  prevBtn.style.display = currentStep === 0 ? "none" : "block";

  if(currentStep === totalSteps){
    nextBtn.style.display = "none";
    finalFields.style.display = "block";
  } else {
    nextBtn.style.display = "block";
    finalFields.style.display = "none";
  }
}

updateUI();

nextBtn.onclick = () => {
  const inputs = steps[currentStep].querySelectorAll("input, select");

  for (let i of inputs){
    if(!i.value) return;
  }

  currentStep++;
  updateUI();
};

prevBtn.onclick = () => {
  if(currentStep > 0){
    currentStep--;
    updateUI();
  }
};

form.addEventListener("submit", function(e){form.addEventListener("submit", function(e form verbergen
  form.style.display = "none";

  // 🎯 success tonen
  successMessage.style.display = "block";

  // 🎯 scroll automatisch naar melding
  window.scrollTo({ top: 0, behavior: "smooth" });
});
  e.preventDefault();

</script>
