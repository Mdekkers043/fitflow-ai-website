<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aanmelden - FitFlow AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #f4f9f5;
  margin: 0;
}

.container {
  max-width: 450px;
  margin: 80px auto;
  padding: 30px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

p {
  text-align: center;
  color: #555;
  margin-bottom: 30px;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 15px;
}

input:focus, select:focus {
  outline: none;
  border: 1px solid #22c55e;
  box-shadow: 0 0 0 2px rgba(34,197,94,0.2);
}

.button {
  background: linear-gradient(135deg,#16a34a,#22c55e);
  color: white;
  padding: 16px;
  border-radius: 14px;
  border: none;
  font-weight: 600;
  width: 100%;
  cursor: pointer;
  margin-top: 10px;
  box-shadow: 0 10px 25px rgba(22,163,74,0.3);
  transition: 0.2s;
}

.button:hover {
  transform: translateY(-2px);
}

.success {
  display: none;
  text-align: center;
}

.success h2 {
  color: #22c55e;
}
</style>
</head>

<body>

<div class="container">

<h1>Aanmelden</h1>
<p>Start jouw FitFlow traject in 30 seconden</p>

<form id="signupForm">

  <!-- ACCOUNT -->
  <input type="email" placeholder="Email" required>
  <input type="password" placeholder="Wachtwoord" required>

  <!-- PERSOONLIJK -->
  <input type="text" placeholder="Naam" required>
  <input type="tel" placeholder="Telefoon (bijv. +31612345678)" required>

  <!-- DOEL -->
  <select required>
    <option value="">Kies jouw doel</option>
    <option>Afvallen</option>
    <option>Spieropbouw</option>
    <option>Fitter worden</option>
  </select>

  <button type="submit" class="button">
    Aanmelden 🚀
  </button>

</form>

<!-- ✅ SUCCES -->
<div class="success" id="successMessage">
  <h2>✅ Gelukt!</h2>
  <p>Je bent succesvol aangemeld.</p>
  <p>Je ontvangt binnenkort je eerste workout 💪</p>
</div>

</div>

<script>
const form = document.getElementById("signupForm");
const success = document.getElementById("successMessage");

form.addEventListener("submit", function(e){
  e.preventDefault();

  form.style.display = "none";
  success.style.display = "block";
});
</script>

</body>
</html>
