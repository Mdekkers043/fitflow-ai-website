<form id="onboardingForm" style="max-width:400px;margin:30px auto 0;">

<p style="font-weight:600;margin-bottom:10px;">
  Binnen 30 seconden gestart ✅
</p>

<!-- ✅ STEP 0 (ACCOUNT) -->
<div class="step">
  <p><strong>Account aanmaken</strong></p>

  <input type="email" placeholder="Email" required
    style="width:100%;padding:14px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;">

  <input type="password" placeholder="Wachtwoord" required
    style="width:100%;padding:14px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;">

  <input type="text" placeholder="Naam" required
    style="width:100%;padding:14px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;">

  <input type="tel" placeholder="Telefoon (+316...)" required
    style="width:100%;padding:14px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;">
</div>

<!-- ✅ STEP 1 -->
<div class="step" style="display:none;">
  <p><strong>Doel</strong></p>

  <select required
    style="width:100%;padding:14px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;">
    <option value="">Kies...</option>
    <option>Afvallen</option>
    <option>Spieropbouw</option>
  </select>
</div>

<!-- ✅ STEP 2 -->
<div class="step" style="display:none;">
  <p><strong>Niveau</strong></p>

  <select required
    style="width:100%;padding:14px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;">
    <option value="">Kies...</option>
    <option>Beginner</option>
    <option>Advanced</option>
  </select>
</div>

<!-- ✅ STEP 3 -->
<div class="step" style="display:none;">
  <p><strong>Dagen per week</strong></p>

  <input type="number" min="1" max="7" required
    style="width:100%;padding:14px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;">
</div>

<!-- ✅ STEP 4 -->
<div class="step" style="display:none;">
  <p><strong>Locatie</strong></p>

  <select required
    style="width:100%;padding:14px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;">
    <option value="">Kies...</option>
    <option>Thuis</option>
    <option>Gym</option>
  </select>
</div>

<!-- ✅ FINAL -->
<div id="finalFields" style="display:none;">
  <button type="submit" class="button" style="width:100%;">
    Aanmelden 🚀
  </button>
</div>

<!-- ✅ NEXT BUTTON -->
<button type="button" id="nextBtn" class="button" style="width:100%;margin-top:10px;">
  Volgende →
</button>

<!-- ✅ SUCCESS -->
<div id="successMessage" style="display:none;text-align:center;margin-top:20px;">
  <h3>✅ Gelukt!</h3>
  <p>Je bent aangemeld.</p>
  <p>Je ontvangt binnenkort je eerste workout 💪</p>
</div>

</form>
<script>
const steps = document.querySelectorAll(".step");
const nextBtn = document.getElementById("nextBtn");
const finalFields = document.getElementById("finalFields");
const form = document.getElementById("onboardingForm");
const successMessage = document.getElementById("successMessage");

let currentStep = 0;

nextBtn.addEventListener("click", () => {
  const inputs = steps[currentStep].querySelectorAll("input, select");

  for (let input of inputs) {
    if (!input.value) return;
  }

  steps[currentStep].style.display = "none";
  currentStep++;

  if (currentStep < steps.length) {
    steps[currentStep].style.display = "block";
  } else {
    nextBtn.style.display = "none";
    finalFields.style.display = "block";
  }
});

form.addEventListener("submit", function(e){
  e.preventDefault();

  form.style.display = "none";
  successMessage.style.display = "block";
});
</script>
