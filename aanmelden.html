<form id="onboardingForm" style="max-width:400px;margin:30px auto 0;">

<p style="font-weight:600;margin-bottom:10px; color:#aaa;">
  Binnen 30 seconden gestart ✅
</p>

<!-- ✅ STEP 0 (ACCOUNT) -->
<div class="step">
  <p style="margin-bottom:6px;"><strong>Account</strong></p>

  <input type="email" placeholder="Email" required class="input-dark">
  <input type="password" placeholder="Wachtwoord" required class="input-dark">
  <input type="text" placeholder="Naam" required class="input-dark">
  <input type="tel" placeholder="WhatsApp (+316...)" required class="input-dark">
</div>

<!-- ✅ STEP 1 -->
<div class="step" style="display:none;">
  <p><strong>Doel</strong></p>

  <select required class="input-dark">
    <option value="">Kies...</option>
    <option>Afvallen</option>
    <option>Spieropbouw</option>
  </select>
</div>

<!-- ✅ STEP 2 -->
<div class="step" style="display:none;">
  <p><strong>Niveau</strong></p>

  <select required class="input-dark">
    <option value="">Kies...</option>
    <option>Beginner</option>
    <option>Advanced</option>
  </select>
</div>

<!-- ✅ STEP 3 -->
<div class="step" style="display:none;">
  <p><strong>Dagen per week</strong></p>

  <input type="number" min="1" max="7" required class="input-dark">
</div>

<!-- ✅ STEP 4 -->
<div class="step" style="display:none;">
  <p><strong>Locatie</strong></p>

  <select required class="input-dark">
    <option value="">Kies...</option>
    <option>Thuis</option>
    <option>Gym</option>
  </select>
</div>

<!-- ✅ FINAL -->
<div id="finalFields" style="display:none; margin-top:10px;">
  <button type="submit" class="button" style="width:100%;">
    Aanmelden 🚀
  </button>
</div>

<!-- ✅ NEXT BUTTON -->
<button type="button" id="nextBtn" class="button" style="width:100%;margin-top:10px;">
  Volgende →
</button>

<!-- ✅ SUCCESS -->
<div id="successMessage" style="display:none;text-align:center; color:white; margin-top:20px;">
  <h3>✅ Gelukt!</h3>
  <p>Je bent aangemeld.</p>
  <p>Je ontvangt binnenkort je eerste workout 💪</p>
</div>

</form>

<style>
/* ✅ DARK INPUT STYLE (BELANGRIJKSTE FIX) */
.input-dark {
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  color:#fff;
  font-size:15px;
}

.input-dark::placeholder {
  color:#aaa;
}

.input-dark:focus {
  outline:none;
  border:1px solid #22c55e;
  box-shadow:0 0 0 2px rgba(34,197,94,0.2);
}

select.input-dark {
  color:#fff;
}

select.input-dark option {
  color:#000;
}
</style>

<script>
const steps = document.querySelectorAll(".step");
const nextBtn = document.getElementById("nextBtn");
const finalFields = document.getElementById("finalFields");
const form = document.getElementById("onboardingForm");
const successMessage = document.getElementById("successMessage");

let currentStep = 0;

nextBtn.addEventListener("click", () => {
  const inputs = steps[currentStep].querySelectorAll("input, select");

  for (let input of inputs) {
    if (!input.value) return;
  }

  steps[currentStep].style.display = "none";
  currentStep++;

  if (currentStep < steps.length) {
    steps[currentStep].style.display = "block";
  } else {
    nextBtn.style.display = "none";
    finalFields.style.display = "block";
  }
});

form.addEventListener("submit", function(e){
  e.preventDefault();

  form.style.display = "none";
  successMessage.style.display = "block";
});
</script>
